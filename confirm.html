<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CollecSnap</title>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px 24px;background:#0A0A0A;color:white;">
  <h2 style="color:#22C55E;">CollecSnap</h2>
  <p style="color:#aaa;margin-bottom:40px;">Appuyez sur le bouton pour confirmer votre adresse e-mail et ouvrir l'application.</p>
  <a id="btn" style="display:inline-block;background:#22C55E;color:#000;padding:16px 32px;border-radius:12px;text-decoration:none;font-weight:bold;font-size:18px;">
    Confirmer mon compte
  </a>
  <script>
    var hash = window.location.hash || window.location.search;
    document.getElementById('btn').href = 'collecsnap://' + hash;
  </script>
</body>
</html>
